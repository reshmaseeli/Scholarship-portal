<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Residency Based Scholarships</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #38f1eb, #ffffff);
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #2196f3, #21cbf3);
    color: rgb(243, 242, 247);
    padding: 80px;
    text-align: center;
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 1px;
    animation: slideDown 1s ease;
}

/* ANIMATION */
@keyframes slideDown {
    from {opacity:0; transform:translateY(-40px);}
    to {opacity:1; transform:translateY(0);}
}

/* CONTAINER */
.container {
    width: 80%;
    margin: 40px auto;
    text-align: center;
}

/* BUTTON CARDS */
.card {
    background: white;
    padding: 20px;
    margin: 20px 0;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    background: #f0faff;
}

/* SCHOLARSHIP BOX */
.scholarships {
    margin-top: 30px;
    display: none;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

.scholarship-item {
    background: #ffffff;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BACK BUTTON */
.back-btn {
    margin-top: 30px;
    padding: 10px 20px;
    background: #ff9800;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.back-btn:hover {
    background: #e68900;
}
</style>

</head>

<body>

<div class="header">📍 Residency Based Scholarships</div>

<div class="container">

    <!-- OPTIONS -->
    <div class="card" onclick="showScholarships('local')">
        🏙️ Local Students
    </div>

    <div class="card" onclick="showScholarships('nonlocal')">
        🌍 Non-Local Students
    </div>

    <!-- SCHOLARSHIP LIST -->
    <div id="scholarshipBox" class="scholarships"></div>

    <button class="back-btn" onclick="goBack()">Back</button>

</div>

<script>

function showScholarships(type) {
    let box = document.getElementById("scholarshipBox");
    box.style.display = "block";

    let data = "";

    if(type === "local") {
        data = `
        <div class="scholarship-item">
            AP Local Merit Scholarship
        </div>

        <div class="scholarship-item">
            State Government Fee Reimbursement
        </div>

        <div class="scholarship-item">
            Local Students Talent Scholarship
        `;
    }

    else {
        data = `
        <div class="scholarship-item">
            National Scholarship Scheme
        </div>

        <div class="scholarship-item">
            Central Government Merit Scholarship
        </div>

        <div class="scholarship-item">
            Non-Local Student Support Scheme
        </div>
        `;
    }

    box.innerHTML = data;
}

function goBack() {
    window.history.back();
}

</script>

</body>
</html>
