<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholarship Application Form</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("../images/scholarship-bg.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* Form Card */

.form-box{
width:480px;
background:rgba(249, 247, 247, 0.85);
padding:35px;
border-radius:12px;
color:rgb(14, 11, 11);
box-shadow:0 15px 35px rgba(7, 133, 252, 0.5);
}

/* Heading */

.form-box h2{
text-align:center;
margin-bottom:20px;
}

/* Input fields */

.form-box input,
.form-box select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
}

/* Button */

.form-box button{
width:100%;
padding:12px;
margin-top:10px;
background:#ffb300;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

/* Message */

#msg{
margin-top:12px;
text-align:center;
font-weight:bold;

}

</style>
</head>

<body>

<div class="form-box">

<h2>Scholarship Application</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="number" id="income" placeholder="Family Income">

<input type="number" id="marks" placeholder="Marks Percentage">

<select id="course">
<option value="">Select Course</option>
<option>B.Tech</option>
<option>B.Sc</option>
<option>B.Com</option>
<option>M.Tech</option>
</select>

<input type="text" id="college" placeholder="College Name">

<button onclick="submitForm()">Submit Application</button>

<p id="msg"></p>

</div>

<script>

function submitForm(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var income=document.getElementById("income").value;
var marks=document.getElementById("marks").value;
var course=document.getElementById("course").value;
var college=document.getElementById("college").value;

var msg=document.getElementById("msg");

if(name=="" || email=="" || income=="" || marks=="" || course=="" || college==""){

msg.style.color="red";
msg.innerHTML="Please fill all fields";

}
else{

msg.style.color="darkgreen";
msg.innerHTML="Application Submitted Successfully";

}

}

</script>

</body>
</html>
