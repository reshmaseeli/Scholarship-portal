<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholarship Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== HEADER ===== */
.header {
    width: 100%;
    text-align: center;
    padding: 40px;
    font-size: 34px;
    font-weight: bold;
    color: white;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* ===== FORM CONTAINER ===== */
.container {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

/* ===== FORM BOX ===== */
.form-box {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    animation: fadeIn 0.8s ease;
}

/* ===== TITLE ===== */
.form-box h2 {
    text-align: center;
    margin-bottom: 10px;
}

.sch-info {
    text-align: center;
    margin-bottom: 15px;
    color: #555;
}

/* ===== INPUTS ===== */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
    font-size: 14px;
}

input:focus, select:focus {
    border-color: #0072ff;
    box-shadow: 0 0 8px rgba(0,114,255,0.3);
}

/* ===== BUTTONS ===== */
.btn-group {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

/* BACK */
.back-btn {
    background: #ddd;
}

.back-btn:hover {
    background: #bbb;
}

/* SUBMIT */
.submit-btn {
    background: linear-gradient(45deg,#00c853,#64dd17);
    color: white;
}

.submit-btn:hover {
    transform: scale(1.05);
}

/* SUCCESS */
#msg {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="header">🎓 AP Scholarship Portal - Application Form</div>

<div class="container">
<div class="form-box">

<h2>Apply for Scholarship</h2>

<div class="sch-info">
    <b id="schName"></b><br>
    <span id="schCourse"></span><br>
    <span id="schType"></span>
</div>

<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="text" placeholder="Phone">
<input type="text" placeholder="Aadhar Number">

<select>
<option>Select Course</option>
<option>Degree</option>
<option>B.Tech</option>
<option>Intermediate</option>
</select>

<select>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
</select>

<input type="text" placeholder="Family Income">
<input type="file">

<div class="btn-group">
<button class="back-btn" onclick="goBack()">Back</button>
<button class="submit-btn" onclick="submitForm()">Submit</button>
</div>

<p id="msg"></p>

</div>
</div>

<script>

/* GET DATA */
let params = new URLSearchParams(window.location.search);

document.getElementById("schName").innerText = params.get("name");
document.getElementById("schCourse").innerText = "Course: " + params.get("course");
document.getElementById("schType").innerText = "Type: " + params.get("type");

/* SUBMIT */
function submitForm(){
    let msg = document.getElementById("msg");

    msg.innerText = "✅ Application Submitted Successfully!";
    msg.style.color = "green";

    setTimeout(()=>{
        msg.innerText="";
    },3000);
}

/* BACK */
function goBack(){
    window.history.back();
}

</script>

</body>
</html>
