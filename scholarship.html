<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Scholarships</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg,#4facfe,#00f2fe,#43e97b,#38f9d7);
    background-size: 400% 400%;
    animation: bg 10s infinite;
}

@keyframes bg {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

header {
    text-align: center;
    font-size: 30px;
    color: white;
    padding: 20px;
    font-weight: bold;
}
/* ===== HERO HEADER (HIGHLIGHTED) ===== */
.hero {
    text-align: center;
    padding: 40px 20px;
    color: white;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    animation: fadeDown 1s ease;
}

/* TEXT STYLE */
.hero h1 {
    margin: 0;
    font-size: 36px;
    letter-spacing: 1px;
}

/* ANIMATION */
@keyframes fadeDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* SEARCH */
.search-box {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px;
}

.search-box input, select, button {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: orange;
    color: white;
    cursor: pointer;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    padding: 20px;
    border-radius: 15px;
    color: white;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* COLORS */
.card:nth-child(1){background:#ff6b6b;}
.card:nth-child(2){background:#6c5ce7;}
.card:nth-child(3){background:#00b894;}
.card:nth-child(4){background:#fdcb6e;}
.card:nth-child(5){background:#0984e3;}
.card:nth-child(6){background:#e17055;}
.card:nth-child(7){background:#00cec9;}
.card:nth-child(8){background:#d63031;}
.card:nth-child(9){background:#2d3436;}
.card:nth-child(10){background:#636e72;}

.btn {
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: white;
    color: black;
    cursor: pointer;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 12px;
    width: 350px;
    animation: pop 0.3s ease;
}

@keyframes pop {
    from{transform:scale(0.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.close {
    float:right;
    cursor:pointer;
    color:red;
    font-size:18px;
}
/* APPLY BUTTON */
.apply-btn {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: linear-gradient(45deg, #00c853, #64dd17);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.apply-btn:hover {
    transform: scale(1.05);
}

/* SUCCESS MESSAGE */
#successMsg {
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
}
</style>
</head>

<body>

<div class="hero">
    <h1>🎓 Explore Scholarships in Andhra Pradesh</h1>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search scholarships">
    <select id="course">
        <option value="">Course</option>
        <option value="Degree">Degree</option>
        <option value="B.Tech">B.Tech</option>
        <option value="Intermediate">Intermediate</option>
    </select>
    <select id="type">
        <option value="">Type</option>
        <option value="Merit">Merit</option>
        <option value="Income">Income</option>
    </select>
    <button onclick="filterData()">Search</button>
</div>

<div class="container" id="cards"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <h3 id="title"></h3>
        <p><strong>Course:</strong> <span id="mcourse"></span></p>
        <p><strong>Type:</strong> <span id="mtype"></span></p>
        <p><strong>Details:</strong></p>
        <p id="mdetails"></p>
        <button class="apply-btn" onclick="goToApply()">Apply Now</button>
<p id="successMsg"></p>
    </div>
</div>

<script>
    function goToApply(){
    let name = document.getElementById("title").innerText;
    let course = document.getElementById("mcourse").innerText;
    let type = document.getElementById("mtype").innerText;

    let url = `application.html?name=${encodeURIComponent(name)}&course=${course}&type=${type}`;

    window.location.href = url;
}

/* DATA */
const scholarships = [
{name:"Jagananna Vidya Deevena",course:"Degree",type:"Income",details:"Full fee reimbursement. Income below ₹2.5L. AP students only."},
{name:"Engineering Merit Scholarship",course:"B.Tech",type:"Merit",details:"Top students get ₹25,000 per year."},
{name:"AP EBC Scholarship",course:"Intermediate",type:"Income",details:"₹10,000 support for EBC students."},
{name:"AP Overseas Scholarship",course:"Degree",type:"Merit",details:"Up to ₹10 Lakhs for abroad studies."},
{name:"Pre-Matric Scholarship",course:"Intermediate",type:"Income",details:"₹8,000 for school students."},
{name:"Post-Matric Scholarship",course:"Degree",type:"Income",details:"Fee reimbursement + allowance."},
{name:"Ambedkar Overseas Vidya Nidhi",course:"Degree",type:"Merit",details:"₹20 Lakhs support for SC/ST."},
{name:"NTR Videshi Vidyadharana",course:"Degree",type:"Merit",details:"₹10 Lakhs for BC students."},
{name:"Tribal Development Scholarship",course:"Degree",type:"Income",details:"Hostel + fee support."},
{name:"Gayathri Academic Excellence",course:"Intermediate",type:"Merit",details:"₹7,500 - ₹20,000."}
];

/* DISPLAY */
function displayData(data){
    let cards = document.getElementById("cards");
    cards.innerHTML = "";

    data.forEach((s,i)=>{
        cards.innerHTML += `
        <div class="card">
            <h3>${s.name}</h3>
            <p>Course: ${s.course}</p>
            <p>Type: ${s.type}</p>
            <button class="btn" onclick="showDetails(${i})">View Details</button>
        </div>`;
    });
}

/* FILTER */
function filterData(){
    let search = document.getElementById("search").value.toLowerCase();
    let course = document.getElementById("course").value;
    let type = document.getElementById("type").value;

    let filtered = scholarships.filter(s =>
        s.name.toLowerCase().includes(search) &&
        (course=="" || s.course==course) &&
        (type=="" || s.type==type)
    );

    displayData(filtered);
}

/* SHOW DETAILS */
function showDetails(index){
    let s = scholarships[index];

    document.getElementById("modal").style.display="flex";
    document.getElementById("title").innerText = s.name;
    document.getElementById("mcourse").innerText = s.course;
    document.getElementById("mtype").innerText = s.type;
    document.getElementById("mdetails").innerText = s.details;
}

/* CLOSE */
function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* LOAD */
displayData(scholarships);

</script>

</body>
</html>
