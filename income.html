<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Income Based Scholarships</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(to right, #f8ffae, #43c6ac);
}

header {
    background: #27ae60;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 25px;
    width: 220px;
    border-radius: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card:hover {
    transform: translateY(-10px);
    background: #eaffea;
}

.question-box {
    display: none;
    text-align: center;
    margin-top: 20px;
}

.btn {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.yes {
    background: #2ecc71;
    color: white;
}

.no {
    background: #e74c3c;
    color: white;
}

.result {
    display: none;
    width: 70%;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

ul {
    text-align: left;
}

.back {
    display: block;
    margin: 20px auto;
    padding: 10px 25px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<header>
<h1>💰 Income Based Scholarships</h1>
<p>Select your income range</p>
</header>

<div class="container">

<div class="card" onclick="selectIncome('low')">Below 1 Lakh</div>
<div class="card" onclick="selectIncome('mid')">1 - 5 Lakhs</div>
<div class="card" onclick="selectIncome('high')">Above 5 Lakhs</div>

</div>

<!-- Question -->
<div class="question-box" id="questionBox">
<h2>Is there any Government Employee in your family?</h2>
<button class="btn yes" onclick="showResult('yes')">Yes</button>
<button class="btn no" onclick="showResult('no')">No</button>
</div>

<!-- Result -->
<div class="result" id="resultBox"></div>

<button class="back" onclick="goBack()">⬅ Back</button>

<script>
let selectedIncome = "";

function selectIncome(type){
    selectedIncome = type;
    document.getElementById("questionBox").style.display = "block";
    document.getElementById("resultBox").style.display = "none";
}

function showResult(answer){
    let result = document.getElementById("resultBox");
    result.style.display = "block";

    let content = "<h3>Available Scholarships:</h3><ul>";

    if(answer === "yes"){
        if(selectedIncome === "low"){
            content += "<li>AP EBC Scholarship</li><li>Post Matric Scholarship</li>";
        }
        else if(selectedIncome === "mid"){
            content += "<li>Merit Cum Means Scholarship</li><li>State Govt Support Scheme</li>";
        }
        else{
            content += "<li>Limited Govt Scholarships Available</li>";
        }
    }
    else{
        if(selectedIncome === "low"){
            content += "<li>YS Jagananna Vidya Deevena</li><li>Full Fee Reimbursement</li>";
        }
        else if(selectedIncome === "mid"){
            content += "<li>Partial Fee Reimbursement</li><li>Private Scholarships</li>";
        }
        else{
            content += "<li>Merit Based Private Scholarships</li>";
        }
    }

    content += "</ul>";

    result.innerHTML = content;
}

function goBack(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
